<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="타임박스">
<meta name="theme-color" content="#1a1a1a">
<link rel="manifest" href="manifest.json">
<title>타임박스 플래너</title>
<style>
  :root {
    --bg:#f0ece4; --card:#faf8f4; --accent:#1a1a1a; --border:#ddd8d0;
    --green:#7ecfa0;
    --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,'Nanum Gothic',sans-serif;}

  /* 헤더 */
  .header{position:fixed;top:0;left:0;right:0;z-index:50;background:var(--accent);
    padding:calc(var(--safe-top) + 10px) 16px 10px;display:flex;align-items:center;justify-content:space-between;}
  .header-title{color:#fff;font-size:15px;font-weight:700;}
  .header-date{color:#aaa;font-size:12px;}

  /* 날짜 바 */
  .date-bar{position:fixed;z-index:40;background:#fff;border-bottom:1px solid var(--border);
    display:flex;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;padding:0 10px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
  .date-bar::-webkit-scrollbar{display:none;}
  .date-nav-btn{background:none;border:none;font-size:18px;color:#888;padding:0 8px;cursor:pointer;flex-shrink:0;}
  .day-chip{display:flex;flex-direction:column;align-items:center;padding:5px 10px;border-radius:10px;
    cursor:pointer;flex-shrink:0;font-size:9px;color:#888;gap:1px;margin:4px 2px;}
  .day-num{font-size:14px;font-weight:700;color:var(--accent);}
  .day-chip.selected{background:var(--accent);color:#fff;}
  .day-chip.selected .day-num{color:#fff;}
  .day-chip.today:not(.selected){background:#f0ede8;}

  /* 완료율 */
  .progress-wrap{position:fixed;z-index:39;background:#fff;border-bottom:1px solid var(--border);
    padding:7px 16px;display:flex;align-items:center;gap:10px;}
  .progress-label{font-size:11px;color:#888;flex-shrink:0;}
  .progress-bar-bg{flex:1;background:#ede9e2;border-radius:99px;height:7px;}
  .progress-bar-fill{height:7px;border-radius:99px;background:var(--accent);transition:width .4s;}
  .progress-pct{font-size:11px;font-weight:700;color:var(--accent);flex-shrink:0;min-width:60px;text-align:right;}

  /* 메인 */
  .main{position:fixed;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .content{margin:10px 12px calc(var(--safe-bot)+16px);display:flex;flex-direction:column;gap:12px;}

  /* 카드 */
  .card{background:var(--card);border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.09);overflow:hidden;}
  .sec-hdr{background:var(--accent);color:#fff;font-size:10px;font-weight:700;letter-spacing:.8px;
    padding:7px 12px;display:flex;align-items:center;justify-content:space-between;}

  /* TOP 4 */
  .priority-item{display:flex;align-items:center;gap:7px;padding:9px 12px;
    border-bottom:1px solid var(--border);cursor:grab;}
  .priority-item:last-child{border-bottom:none;}
  .priority-item.dragging{opacity:.4;background:#f0ede8;}
  .priority-item.drag-over{background:#e8f5ee;border-bottom:2px solid var(--green);}
  .drag-handle{font-size:14px;color:#ccc;cursor:grab;flex-shrink:0;user-select:none;}
  .p-num{width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;
    font-size:11px;font-weight:700;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .p-input{flex:1;border:none;outline:none;font-size:13px;font-family:inherit;background:transparent;color:#333;min-width:0;}
  .p-input::placeholder{color:#ccc;}
  .p-cat-badge{font-size:9px;color:#aaa;flex-shrink:0;padding:0 2px;}
  .p-time{width:58px;flex-shrink:0;border:1.5px solid var(--border);border-radius:8px;
    padding:4px 5px;font-size:12px;text-align:center;outline:none;font-family:inherit;color:#555;background:#fff;}
  .p-time::placeholder{color:#ccc;font-size:10px;}
  .p-time:focus{border-color:var(--accent);}
  .p-demote{font-size:13px;cursor:pointer;border:none;background:none;flex-shrink:0;color:#bbb;padding:0 1px;}
  .p-demote:active{color:#e07070;}
  .p-check{width:20px;height:20px;border:1.5px solid #ddd;border-radius:50%;cursor:pointer;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .2s;}
  .p-check.done{background:var(--green);border-color:var(--green);color:#fff;}

  /* BRAIN DUMP 2x2 */
  .dump-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto;}
  .dump-col{display:flex;flex-direction:column;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
  .dump-col:nth-child(2){border-right:none;}
  .dump-col:nth-child(3){border-bottom:none;}
  .dump-col:nth-child(4){border-right:none;border-bottom:none;}
  .dump-col-hdr{padding:6px 0;text-align:center;font-size:10px;font-weight:700;
    letter-spacing:.8px;color:#fff;border-bottom:1px solid var(--border);}
  /* 각 칸 헤더 색상 */
  .dump-col:nth-child(1) .dump-col-hdr{background:#3a3a3a;}
  .dump-col:nth-child(2) .dump-col-hdr{background:#4a6fa5;}
  .dump-col:nth-child(3) .dump-col-hdr{background:#5a8a6a;}
  .dump-col:nth-child(4) .dump-col-hdr{background:#8a5a7a;}

  .dump-items{flex:1;}
  .dump-item{display:flex;align-items:center;gap:4px;padding:5px 7px;border-bottom:1px solid #f0ede8;}
  .dump-item:last-child{border-bottom:none;}
  .dump-cb{width:15px;height:15px;border:1.5px solid #ccc;border-radius:4px;cursor:pointer;
    flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .2s;}
  .dump-cb.done{background:var(--accent);border-color:var(--accent);color:#fff;}
  .dump-text{flex:1;border:none;outline:none;font-size:12px;font-family:inherit;
    background:transparent;color:#333;min-width:0;}
  .dump-text::placeholder{color:#ddd;}
  .dump-text.done{text-decoration:line-through;color:#bbb;}
  .dump-promote{font-size:11px;cursor:pointer;border:none;background:none;
    flex-shrink:0;padding:0;opacity:.3;transition:opacity .15s;}
  .dump-promote:active{opacity:1;}
  .dump-add{width:100%;padding:5px;font-size:11px;color:#bbb;border:none;
    background:none;cursor:pointer;text-align:center;}

  /* 전일 미완료 */
  .yesterday-wrap{border-top:1px solid var(--border);}
  .yesterday-hdr{padding:6px 12px;font-size:10px;font-weight:700;color:#e07070;
    background:#fff5f5;display:flex;align-items:center;gap:4px;}
  .yesterday-item{display:flex;align-items:center;gap:8px;
    padding:7px 12px 7px 20px;border-bottom:1px solid #f5ede8;background:#fffaf9;}
  .yesterday-item:last-child{border-bottom:none;}
  .y-text{flex:1;font-size:12px;color:#999;min-width:0;}
  .y-cat{font-size:9px;color:#bbb;flex-shrink:0;background:#f0ede8;padding:1px 5px;border-radius:4px;}
  .y-move{font-size:10px;color:#e07070;border:1px solid #f4a7a7;
    border-radius:5px;padding:2px 7px;cursor:pointer;background:none;flex-shrink:0;}

  /* 카테고리 선택 시트 */
  .cat-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.45);align-items:flex-end;}
  .cat-overlay.open{display:flex;}
  .cat-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;
    padding:16px 20px calc(var(--safe-bot)+16px);}
  .cat-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:14px;text-align:center;}
  .cat-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .cat-btn{padding:13px;border:1.5px solid var(--border);border-radius:12px;
    font-size:13px;font-weight:700;cursor:pointer;background:#fff;color:var(--accent);text-align:center;}
  .cat-btn:active{background:var(--accent);color:#fff;}
  .cat-cancel{width:100%;margin-top:10px;padding:12px;border:none;border-radius:12px;
    font-size:13px;color:#888;background:#f0ede8;cursor:pointer;}
</style>
</head>
<body>

<div class="header" id="header">
  <div class="header-title">📅 타임박스 플래너</div>
  <div class="header-date" id="hdr-date"></div>
</div>

<div class="date-bar" id="date-bar">
  <button class="date-nav-btn" onclick="changeWeek(-1)">‹</button>
  <div id="day-chips" style="display:flex;"></div>
  <button class="date-nav-btn" onclick="changeWeek(1)">›</button>
</div>

<div class="progress-wrap" id="progress-wrap">
  <span class="progress-label">오늘 달성률</span>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
  <span class="progress-pct" id="prog-pct">0/0 (0%)</span>
</div>

<div class="main" id="main">
  <div class="content">

    <!-- TOP 4 -->
    <div class="card">
      <div class="sec-hdr">⭐ TOP 4 PRIORITIES</div>
      <div id="priority-list"></div>
    </div>

    <!-- BRAIN DUMP 2x2 -->
    <div class="card">
      <div class="sec-hdr">🧠 BRAIN DUMP</div>
      <div class="dump-grid">
        <div class="dump-col">
          <div class="dump-col-hdr">NEW</div>
          <div class="dump-items" id="items-NEW"></div>
          <button class="dump-add" onclick="addDump('NEW')">＋</button>
        </div>
        <div class="dump-col">
          <div class="dump-col-hdr">MY</div>
          <div class="dump-items" id="items-MY"></div>
          <button class="dump-add" onclick="addDump('MY')">＋</button>
        </div>
        <div class="dump-col">
          <div class="dump-col-hdr">FAMILY</div>
          <div class="dump-items" id="items-FAMILY"></div>
          <button class="dump-add" onclick="addDump('FAMILY')">＋</button>
        </div>
        <div class="dump-col">
          <div class="dump-col-hdr">BUSINESS</div>
          <div class="dump-items" id="items-BUSINESS"></div>
          <button class="dump-add" onclick="addDump('BUSINESS')">＋</button>
        </div>
      </div>
      <div id="yesterday-section"></div>
    </div>

  </div>
</div>

<!-- 카테고리 선택 시트 -->
<div class="cat-overlay" id="cat-overlay" onclick="if(event.target===this)closeCatSheet()">
  <div class="cat-sheet">
    <div class="cat-title">어느 칸으로 내릴까요?</div>
    <div class="cat-btns">
      <button class="cat-btn" onclick="confirmDemote('NEW')">NEW</button>
      <button class="cat-btn" onclick="confirmDemote('MY')">MY</button>
      <button class="cat-btn" onclick="confirmDemote('FAMILY')">FAMILY</button>
      <button class="cat-btn" onclick="confirmDemote('BUSINESS')">BUSINESS</button>
    </div>
    <button class="cat-cancel" onclick="closeCatSheet()">취소</button>
  </div>
</div>

<script>
const DAYS_KO=['일','월','화','수','목','금','토'];
const CATS=['NEW','MY','FAMILY','BUSINESS'];
const DEFAULT_DUMPS=5;
let selDate=toKey(new Date()), weekStart=getMonday(new Date());
let dragSrcIdx=null, demotePIdx=null;

function toKey(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function p2(n){return String(n).padStart(2,'0');}
function getMonday(d){const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);const m=new Date(d);m.setDate(diff);return m;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function load(k,def){try{return JSON.parse(localStorage.getItem(k))??def;}catch{return def;}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}

function makeDefaultDumps(){
  const obj={};
  CATS.forEach(c=>{obj[c]=Array.from({length:DEFAULT_DUMPS},()=>({text:'',done:false}));});
  return obj;
}
function dayData(key){
  return load('tbp6_'+key,{
    priorities:[
      {text:'',time:'',done:false,cat:''},{text:'',time:'',done:false,cat:''},
      {text:'',time:'',done:false,cat:''},{text:'',time:'',done:false,cat:''}
    ],
    dumps:makeDefaultDumps()
  });
}
function saveDay(key,d){save('tbp6_'+key,d);}
function getPrevKey(key){const d=new Date(key+'T00:00:00');d.setDate(d.getDate()-1);return toKey(d);}
function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* 레이아웃 */
function fixLayout(){
  const hH=document.getElementById('header').offsetHeight;
  const dH=document.getElementById('date-bar').offsetHeight;
  const pH=document.getElementById('progress-wrap').offsetHeight;
  document.getElementById('date-bar').style.top=hH+'px';
  document.getElementById('progress-wrap').style.top=(hH+dH)+'px';
  document.getElementById('main').style.top=(hH+dH+pH)+'px';
}

/* 날짜 바 */
function renderDayChips(){
  const today=toKey(new Date()),c=document.getElementById('day-chips');
  c.innerHTML='';
  for(let i=0;i<7;i++){
    const d=addDays(weekStart,i),key=toKey(d),chip=document.createElement('div');
    chip.className='day-chip'+(key===selDate?' selected':(key===today?' today':''));
    chip.innerHTML='<span>'+DAYS_KO[d.getDay()]+'</span><span class="day-num">'+d.getDate()+'</span>';
    chip.onclick=()=>{selDate=key;renderAll();};
    c.appendChild(chip);
  }
  const d=new Date(selDate+'T00:00:00');
  document.getElementById('hdr-date').textContent=
    d.getFullYear()+'.'+p2(d.getMonth()+1)+'.'+p2(d.getDate())+' ('+DAYS_KO[d.getDay()]+')';
}
function changeWeek(dir){weekStart=addDays(weekStart,dir*7);renderAll();}

/* 완료율 */
function updateProgress(){
  const data=dayData(selDate);
  let all=[];
  data.priorities.filter(p=>p.text.trim()).forEach(p=>all.push(p));
  CATS.forEach(c=>(data.dumps[c]||[]).filter(d=>d.text.trim()).forEach(d=>all.push(d)));
  const done=all.filter(x=>x.done).length, total=all.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=done+'/'+total+' ('+pct+'%)';
}

/* TOP 4 */
function renderPriorities(){
  const data=dayData(selDate),list=document.getElementById('priority-list');
  list.innerHTML='';
  data.priorities.forEach((p,i)=>{
    const row=document.createElement('div');
    row.className='priority-item'; row.draggable=true; row.dataset.idx=i;
    row.innerHTML=
      '<span class="drag-handle">⠿</span>'+
      '<div class="p-num">'+(i+1)+'</div>'+
      '<input class="p-input" placeholder="'+['오늘의 첫 목표','두 번째 중요한 일','세 번째 할 일','네 번째 할 일'][i]+'" value="'+escHtml(p.text||'')+'" data-i="'+i+'">'+
      (p.cat?'<span class="p-cat-badge">'+p.cat+'</span>':'')+
      '<input class="p-time" placeholder="시간" value="'+escHtml(p.time||'')+'" data-i="'+i+'">'+
      '<button class="p-demote" data-i="'+i+'" title="Brain Dump으로">↓</button>'+
      '<div class="p-check'+(p.done?' done':'')+'" data-i="'+i+'">'+(p.done?'✓':'')+'</div>';

    row.addEventListener('dragstart',e=>{dragSrcIdx=i;row.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    row.addEventListener('dragend',()=>{row.classList.remove('dragging');document.querySelectorAll('.priority-item').forEach(r=>r.classList.remove('drag-over'));});
    row.addEventListener('dragover',e=>{e.preventDefault();row.classList.add('drag-over');});
    row.addEventListener('dragleave',()=>row.classList.remove('drag-over'));
    row.addEventListener('drop',e=>{
      e.preventDefault();
      if(dragSrcIdx===null||dragSrcIdx===i)return;
      const d=dayData(selDate);
      const moved=d.priorities.splice(dragSrcIdx,1)[0];
      d.priorities.splice(i,0,moved);
      saveDay(selDate,d);renderPriorities();updateProgress();
    });
    let touchStartY=0;
    row.addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY;dragSrcIdx=i;},{passive:true});
    row.addEventListener('touchmove',e=>{
      const dy=e.touches[0].clientY-touchStartY;
      row.style.transform='translateY('+dy+'px)';row.style.zIndex='100';row.style.position='relative';
    },{passive:true});
    row.addEventListener('touchend',e=>{
      row.style.transform='';row.style.zIndex='';row.style.position='';
      const touch=e.changedTouches[0];
      const el=document.elementFromPoint(touch.clientX,touch.clientY);
      const targetRow=el?.closest('.priority-item');
      if(targetRow&&targetRow!==row){
        const toIdx=+targetRow.dataset.idx;
        const d=dayData(selDate);
        const moved=d.priorities.splice(dragSrcIdx,1)[0];
        d.priorities.splice(toIdx,0,moved);
        saveDay(selDate,d);renderPriorities();updateProgress();
      }
      dragSrcIdx=null;
    });

    row.querySelector('.p-input').addEventListener('input',function(){
      const d=dayData(selDate);d.priorities[+this.dataset.i].text=this.value;saveDay(selDate,d);updateProgress();
    });
    row.querySelector('.p-time').addEventListener('input',function(){
      const d=dayData(selDate);d.priorities[+this.dataset.i].time=this.value;saveDay(selDate,d);
    });
    row.querySelector('.p-demote').addEventListener('click',function(){
      const d=dayData(selDate),idx=+this.dataset.i;
      if(!d.priorities[idx].text.trim())return;
      demotePIdx=idx;
      const cat=d.priorities[idx].cat;
      if(cat&&CATS.includes(cat)) confirmDemote(cat);
      else openCatSheet();
    });
    row.querySelector('.p-check').addEventListener('click',function(){
      const d=dayData(selDate),idx=+this.dataset.i;
      d.priorities[idx].done=!d.priorities[idx].done;
      saveDay(selDate,d);renderPriorities();updateProgress();
    });
    list.appendChild(row);
  });
}

/* 카테고리 시트 */
function openCatSheet(){document.getElementById('cat-overlay').classList.add('open');}
function closeCatSheet(){document.getElementById('cat-overlay').classList.remove('open');demotePIdx=null;}
function confirmDemote(cat){
  if(demotePIdx===null){closeCatSheet();return;}
  const d=dayData(selDate),p=d.priorities[demotePIdx];
  if(!p.text.trim()){closeCatSheet();return;}
  const slot=(d.dumps[cat]||[]).findIndex(item=>!item.text.trim());
  if(slot>=0) d.dumps[cat][slot]={text:p.text,done:false};
  else d.dumps[cat].push({text:p.text,done:false});
  d.priorities[demotePIdx]={text:'',time:'',done:false,cat:''};
  saveDay(selDate,d);closeCatSheet();
  renderPriorities();renderDumps();updateProgress();
}

/* BRAIN DUMP */
function renderDumps(){
  const data=dayData(selDate);
  CATS.forEach(cat=>{
    const container=document.getElementById('items-'+cat);
    container.innerHTML='';
    (data.dumps[cat]||[]).forEach((item,i)=>{
      const row=document.createElement('div');
      row.className='dump-item';
      row.innerHTML=
        '<div class="dump-cb'+(item.done?' done':'')+'" data-cat="'+cat+'" data-i="'+i+'">'+(item.done?'✓':'')+'</div>'+
        '<input class="dump-text'+(item.done?' done':'')+'" value="'+escHtml(item.text)+'" data-cat="'+cat+'" data-i="'+i+'" placeholder="할 일...">'+
        '<button class="dump-promote" data-cat="'+cat+'" data-i="'+i+'" title="TOP 4로">⭐</button>';
      row.querySelector('.dump-cb').addEventListener('click',function(){
        const d=dayData(selDate);
        d.dumps[this.dataset.cat][+this.dataset.i].done=!d.dumps[this.dataset.cat][+this.dataset.i].done;
        saveDay(selDate,d);renderDumps();updateProgress();
      });
      row.querySelector('.dump-text').addEventListener('input',function(){
        const d=dayData(selDate);
        d.dumps[this.dataset.cat][+this.dataset.i].text=this.value;saveDay(selDate,d);updateProgress();
      });
      row.querySelector('.dump-promote').addEventListener('click',function(){
        const d=dayData(selDate),cat=this.dataset.cat,idx=+this.dataset.i;
        const text=d.dumps[cat][idx].text.trim();
        if(!text)return;
        const slot=d.priorities.findIndex(p=>!p.text.trim());
        if(slot<0){alert('TOP 4가 모두 채워져 있습니다.');return;}
        d.priorities[slot]={text,time:'',done:false,cat};
        d.dumps[cat].splice(idx,1);
        while(d.dumps[cat].length<DEFAULT_DUMPS) d.dumps[cat].push({text:'',done:false});
        saveDay(selDate,d);renderPriorities();renderDumps();updateProgress();
      });
      container.appendChild(row);
    });
  });
  renderYesterday();
}

function addDump(cat){
  const d=dayData(selDate);
  d.dumps[cat]=d.dumps[cat]||[];
  d.dumps[cat].push({text:'',done:false});
  saveDay(selDate,d);renderDumps();
  setTimeout(()=>{
    const inputs=document.querySelectorAll('#items-'+cat+' .dump-text');
    if(inputs.length) inputs[inputs.length-1].focus();
  },50);
}

/* 전일 미완료 */
function renderYesterday(){
  const sec=document.getElementById('yesterday-section');
  sec.innerHTML='';
  const prevKey=getPrevKey(selDate),prevData=dayData(prevKey);
  let undone=[];
  CATS.forEach(cat=>(prevData.dumps[cat]||[]).filter(i=>!i.done&&i.text.trim()).forEach(i=>undone.push({...i,cat})));
  if(!undone.length)return;
  const prevDate=new Date(prevKey+'T00:00:00');
  const wrap=document.createElement('div');
  wrap.className='yesterday-wrap';
  const hdr=document.createElement('div');
  hdr.className='yesterday-hdr';
  hdr.textContent='⚠ 전일 미완료 ('+p2(prevDate.getMonth()+1)+'/'+p2(prevDate.getDate())+')';
  wrap.appendChild(hdr);
  undone.forEach(item=>{
    const row=document.createElement('div');
    row.className='yesterday-item';
    row.innerHTML=
      '<span class="y-cat">'+item.cat+'</span>'+
      '<span class="y-text">'+escHtml(item.text)+'</span>'+
      '<button class="y-move" data-text="'+escHtml(item.text)+'" data-cat="'+item.cat+'">오늘로</button>';
    row.querySelector('.y-move').addEventListener('click',function(){
      const d=dayData(selDate),cat=this.dataset.cat;
      d.dumps[cat]=d.dumps[cat]||[];
      const slot=d.dumps[cat].findIndex(i=>!i.text.trim());
      if(slot>=0) d.dumps[cat][slot]={text:this.dataset.text,done:false};
      else d.dumps[cat].push({text:this.dataset.text,done:false});
      saveDay(selDate,d);
      const prev=dayData(prevKey);
      const idx=(prev.dumps[cat]||[]).findIndex(i=>i.text===this.dataset.text&&!i.done);
      if(idx>=0){prev.dumps[cat][idx].done=true;saveDay(prevKey,prev);}
      renderDumps();updateProgress();
    });
    wrap.appendChild(row);
  });
  sec.appendChild(wrap);
}

/* 전체 렌더 */
function renderAll(){
  renderDayChips();renderPriorities();renderDumps();updateProgress();fixLayout();
}
window.addEventListener('resize',fixLayout);
renderAll();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(reg=>{
    reg.addEventListener('updatefound',()=>{
      const sw=reg.installing;
      sw.addEventListener('statechange',()=>{
        if(sw.state==='installed'&&navigator.serviceWorker.controller) window.location.reload();
      });
    });
  });
}
</script>
